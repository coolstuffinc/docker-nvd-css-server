name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile-mods:
    runs-on: ubuntu-latest
    outputs:
      compilation_success: ${{ steps.compile.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Prepare SourcePawn Environment
        run: bash setup_sourcepawn.sh

      - name: Compile Plugins
        id: compile
        run: ./spcomp-nix

      - name: Update Assets Branch
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch and switch to assets branch, using -- to disambiguate from assets/ directory
          git fetch origin assets
          git checkout assets -- || git checkout -b assets origin/assets || git checkout -b assets
          
          mkdir -p mods
          cp compiled_plugins/*.smx mods/
          
          # Force add because mods/ is gitignored
          git add -f mods/*.smx
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "CI: Update compiled plugins [skip ci]"
            git push origin assets
          fi

      - name: Upload Compiled Plugins
        uses: actions/upload-artifact@v4
        with:
          name: compiled-mods
          path: compiled_plugins/*.smx

  build-docker:
    needs: compile-mods
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Compiled Plugins
        uses: actions/download-artifact@v4
        with:
          name: compiled-mods
          path: mods/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: zoidicabra/steam-css:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
