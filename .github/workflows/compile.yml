name: Compile SourcePawn Plugins

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**/*.sp'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Prepare SourcePawn Environment
        run: |
          # Use the setup script we created
          bash setup_sourcepawn.sh

      - name: Compile Plugins
        run: |
          mkdir -p compiled_plugins
          for spfile in src/*.sp; do
            if [ -s "$spfile" ]; then
              smxname=$(basename "${spfile%.sp}.smx")
              echo "Compiling $spfile..."
              ./spcomp-nix "$spfile" -ocompiled_plugins/"$smxname"
            fi
          done

      - name: Update Assets Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # We want to push the compiled .smx files to the 'assets' branch in the 'mods/' folder
          git checkout assets || git checkout -b assets
          
          mkdir -p mods
          cp compiled_plugins/*.smx mods/
          
          git add mods/*.smx
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "CI: Update compiled plugins [skip ci]"
            git push origin assets
          fi
